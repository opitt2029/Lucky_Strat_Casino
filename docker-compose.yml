services:
  mysql:
    image: mysql:8.0
    container_name: lucky-star-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - lucky_mysql80_data:/var/lib/mysql
      - ./database/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - lucky-network

  postgres:
    image: postgres:16
    container_name: lucky-star-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - lucky_postgres_data:/var/lib/postgresql/data
      - ./database/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - lucky-network

  redis:
    image: redis:7
    container_name: lucky-star-redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lucky-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: lucky-star-zookeeper
    restart: always
    ports:
      - "${ZOOKEEPER_PORT}:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep Mode"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - lucky_zookeeper_data:/var/lib/zookeeper/data
      - lucky_zookeeper_log:/var/lib/zookeeper/log
    networks:
      - lucky-network

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: lucky-star-kafka
    restart: always
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: lucky-star-zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://lucky-star-kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - lucky_kafka_zk_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    networks:
      - lucky-network

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: lucky-star-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./kafka/kafka-init.sh:/kafka-init.sh:ro
    command: ["bash", "/kafka-init.sh"]
    networks:
      - lucky-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: lucky-star-kafka-ui
    restart: always
    depends_on:
      - kafka
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-lucky-star
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: lucky-star-kafka:29092
    networks:
      - lucky-network

volumes:
  lucky_mysql80_data:
  lucky_postgres_data:
  lucky_zookeeper_data:
  lucky_zookeeper_log:
  lucky_kafka_zk_data:

networks:
  lucky-network:
    driver: bridge
