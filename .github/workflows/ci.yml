# 這個 workflow 的名稱，會顯示在 GitHub 頁面上
name: CI

# 觸發條件：push 或 PR 到 main / develop 分支時自動執行
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1：基礎設施腳本測試（既有）
  # ---------------------------------------------------------------------------
  infra-test:
    name: 基礎設施測試
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      - name: 安裝 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 執行基礎設施測試
        run: node --test tests/infra/*.test.js

  # ---------------------------------------------------------------------------
  # Job 2：後端服務測試擋關（新增）
  #
  # 為什麼要這個 job？
  #   先前 wallet-service 因 KafkaConsumerConfig 重複 @Bean 而「無法啟動」的 bug
  #   被合併進了 develop，正是因為 CI 從未跑過後端 Maven 測試。
  #   各服務的 @SpringBootTest（contextLoads）會實際載入整個 Spring context，
  #   能在合併前就攔截「服務根本起不來」這類設定錯誤。
  #
  # 不需外部資料庫：member / wallet 的測試皆使用 H2 記憶體資料庫（見各自
  #   src/test/resources/application.yml），所以 CI 不必啟動 PostgreSQL/MySQL/Kafka。
  #
  # 範圍：目前只跑「已實作」的三個服務。game/rank/admin 仍為骨架，待其補上
  #   可獨立啟動的測試設定後，再加進下面的 -pl 清單。
  # ---------------------------------------------------------------------------
  backend-test:
    name: 後端服務測試
    runs-on: ubuntu-latest

    # contextLoads 需要這些「必填、無預設值」的環境變數（否則 Spring 啟動即失敗）。
    # 這裡的值僅供 CI 測試使用，並非真實密鑰。
    env:
      JWT_SECRET: ci-test-jwt-secret-key-please-change-in-production-0123456789abcdef
      INTERNAL_SECRET: ci-test-internal-secret
      INTERNAL_SERVICE_SECRET: ci-test-internal-secret
      CORS_ALLOWED_ORIGINS: http://localhost:5173

    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      - name: 安裝 JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven   # 快取 ~/.m2，加速後續執行

      - name: 執行後端測試（gateway / member / wallet）
        run: >-
          mvn -B -ntp
          -pl backend/gateway-service,backend/member-service,backend/wallet-service
          clean test
