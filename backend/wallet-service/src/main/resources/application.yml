server:
  port: 8082

spring:
  application:
    name: wallet-service

  # ================================================================
  # 雙資料庫設定（ADR-001：CQRS 讀寫分離）
  # 注意：雙 DataSource 需要自訂 DataSourceConfig.java
  #       Spring Boot JPA 自動配置僅支援單一資料源
  #       wallet-service 啟動時會使用下方 postgres 設定作為 @Primary
  # ================================================================

  # PostgreSQL — 帳務寫庫（@Primary DataSource）
  # wallets、wallet_transactions（寫端）
  datasource:
    jdbc-url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:lucky_star_casino}
    username: ${POSTGRES_USER:lucky_user}
    password: ${POSTGRES_PASSWORD:lucky_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 30000

  # 注意：spring.jpa.* 在此服務無效 —— EntityManagerFactory 由 DataSourceConfig.java
  # 手動建立（雙 EMF 不能用 Spring Boot 預設自動配置）。
  # JPA_DDL_AUTO 環境變數會被讀進 postgresEntityManagerFactory，預設 validate。

  # MySQL — CQRS 讀端 DataSource（DataSourceConfig.mysqlDataSource 綁定此前綴）
  datasource-mysql:
    jdbc-url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/${MYSQL_DATABASE:lucky_star_casino}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei&characterEncoding=UTF-8
    username: ${MYSQL_USER:lucky_user}
    password: ${MYSQL_PASSWORD:lucky_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # Redis — 贈幣當日累計、破產補助當日狀態（TTL 到午夜）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  # Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      retries: 3
    consumer:
      group-id: wallet-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.luckystar.wallet: ${LOG_LEVEL_APP:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:OFF}
