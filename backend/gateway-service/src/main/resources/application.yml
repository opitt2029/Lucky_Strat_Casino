server:
  port: 8080

spring:
  application:
    name: gateway-service

  # Redis Reactive — JWT 黑名單查詢、限流計數器
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  # Spring Cloud Gateway 路由設定（詳細路由規則待 T-003 補充）
  cloud:
    gateway:
      # 預設 CORS 設定，前端 localhost:5173 開發期間使用
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS environment variable is required}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - X-Requested-With
            allowCredentials: true
      routes:
        # 白名單路徑：免 JWT 驗證（登入/註冊）
        # 套用速率限制防暴力破解：5 req/sec replenish, burst 10
        - id: member-auth
          uri: ${MEMBER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${AUTH_RATE_LIMIT_REPLENISH:5}
                redis-rate-limiter.burstCapacity: ${AUTH_RATE_LIMIT_BURST:10}
                key-resolver: "#{@ipKeyResolver}"
        # 會員 API（需 JWT）
        - id: member-player
          uri: ${MEMBER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/player/**
        # 錢包 API（需 JWT）
        - id: wallet
          uri: ${WALLET_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/wallet/**
        # 遊戲 API（需 JWT）
        - id: game
          uri: ${GAME_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/game/**
        # 排行榜 API（需 JWT）
        - id: rank
          uri: ${RANK_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/rank/**
        # 管理介面（需 ADMIN role）
        - id: admin
          uri: ${ADMIN_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/admin/**

# JWT 設定 — secret 必須與 member-service 簽發端完全一致
jwt:
  secret: ${JWT_SECRET:?JWT_SECRET environment variable is required}
  # JwtAuthenticationGlobalFilter 跳過驗證的路徑前綴
  whitelist:
    - /api/v1/auth/
    - /actuator/health

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.luckystar.gateway: ${LOG_LEVEL_APP:INFO}
    org.springframework.cloud.gateway: ${LOG_LEVEL_GATEWAY:INFO}
